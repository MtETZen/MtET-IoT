<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประวัติส่วนตัวของฉัน</title>
    <style>
        /* ตกแต่งหน้าเว็บเบื้องต้นให้ดูสวยงาม */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            text-align: center;
            padding: 50px;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 600px;
            margin: auto;
        }
        img {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 50%; /* ทำให้รูปเป็นวงกลม */
            border: 4px solid #007bff;
        }
        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        a:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- ส่วนของรูปภาพ (เปลี่ยนชื่อไฟล์รูปใน src ให้ตรงกับรูปของคุณ) -->
        <img src="myphoto.jpg" alt="รูปโปรไฟล์ของฉัน">

        <!-- ส่วนของข้อมูลส่วนตัว -->
        <h1>สวัสดีครับ ผมชื่อ [Possawee]</h1>
        <h2>ชื่อเล่น: <div Zen=""></div></h2>
        <p><strong>อายุ:</strong> [22] ปี</p>
        <p><strong>งานอดิเรก:</strong> เขียนโค้ด, เล่นเกม, ฟังเพลง</p>
        <p><strong>เป้าหมาย:</strong> พัฒนาตัวเองให้เก่งขึ้นในทุกๆ วัน</p>

        <!-- ส่วนของ URL Link -->
        <a href="https://github.com/MtETZen" target="_blank">เยี่ยมชม GitHub ของฉัน</a>
    </div>

</body>
</html>
